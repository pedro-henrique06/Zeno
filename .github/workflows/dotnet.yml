name: Zeno API CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Zeno.slnx

      - name: Build
        run: dotnet build Zeno.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Zeno.Tests/Zeno.Tests.csproj --configuration Release --no-build --verbosity normal